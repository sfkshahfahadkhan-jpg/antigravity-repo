<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <style>
      body { background-color: #f8fafc; color: #0f172a; transition: background-color 0.3s, color 0.3s; }
      html.dark body { background-color: #020617; color: #f8fafc; }
    </style>
    <script>
      const theme = localStorage.getItem('sfk-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head><body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
